services:
  - type: web
    name: eventvault
    env: python
    plan: free
    buildCommand: ""
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /var/data/eventvault.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: eventvault-data
      mountPath: /var/data
      sizeGB: 1
